<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RadioPeng</title>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <div class="title">RadioPeng</div>
        <div class="tagline">eclectic transmissions from the penguin belt 🐧📡</div>
      </div>
      <nav>
        <a class="pill" href="/">Home</a>
        <a class="pill" href="/articles/">Articles</a>
      </nav>
    </header>

    
  </div>

  <!-- Player Bar -->
  <div class="playerbar">
    <div class="player-inner">
      <button class="btn" id="playBtn">Play</button>

      <div class="now">
        <div class="label">Now Playing</div>
        <div class="value" id="npText">Loading…</div>

        <div class="meta" style="margin-top:6px;">
          <span class="badge">
            <span class="dot" id="liveDot"></span>
            <span id="liveStatus">Idle</span>
          </span>
          <span style="margin-left:10px;" id="listenerText">Listeners: –</span>
        </div>
      </div>

      <div class="vol">
        <span>Volume</span>
        <input id="vol" type="range" min="0" max="1" step="0.01" value="0.85" />
      </div>
    </div>
  </div>

  <script src="/assets/player.js"></script>
</body>
</html>
