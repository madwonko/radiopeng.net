<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RadioPeng Articles</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <div class="title">RadioPeng</div>
        <div class="tagline">articles from the ping-wing 🐧✍️</div>
      </div>
      <nav>
        <a class="pill" href="../index.html">Home</a>
        <a class="pill" href="index.html">Articles</a>
      </nav>
    </header>

    <section class="hero">
      <h1>Articles</h1>
      <p>Reviews, dispatches, and the occasional sonic conspiracy theory.</p>
    </section>

    <section class="card" style="margin-top:18px;">
      <div class="article-list">
        <a class="article" href="hello-peng.html">
          <div class="kicker">Jan 2026 • Dispatch</div>
          <div class="name">Hello, Peng</div>
          <div class="blurb">A tiny manifesto for strange music and the joy of pressing play.</div>
        </a>
      </div>
    </section>
  </div>

  <div class="playerbar">
    <div class="player-inner">
      <button class="btn" id="playBtn">Play</button>

      <div class="now">
        <div class="label">Status</div>
        <div class="value">
          <span class="badge"><span class="dot" id="liveDot"></span><span id="liveStatus">Idle</span></span>
        </div>
      </div>

      <div class="vol">
        <span>Volume</span>
        <input id="vol" type="range" min="0" max="1" step="0.01" value="0.85" />
      </div>
    </div>
  </div>

  <script src="../assets/player.js"></script>
</body>
</html>
