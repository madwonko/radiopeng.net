backend:
  name: github
  repo: madwonko/radiopeng.net
  branch: main
  base_url: https://genuine-dolphin-de8ae5.netlify.app/
  auth_endpoint: auth

site_url: https://www.radiopeng.net
display_url: https://www.radiopeng.net
publish_mode: simple

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "articles"
    label: "Articles"
    folder: "src/articles"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }